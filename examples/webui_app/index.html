<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Member Intake Form</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef3f8;
      color: #17212c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.86), rgba(238, 243, 248, 0.64)),
        url("data:image/svg+xml,%3Csvg width='1200' height='720' viewBox='0 0 1200 720' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1200' height='720' fill='%23dce9f0'/%3E%3Cpath d='M0 540C155 493 250 616 403 558c106-40 150-148 295-130 110 14 156 86 283 41 84-30 126-90 219-78v329H0Z' fill='%23b7d1dd'/%3E%3Cpath d='M0 405c172-72 291-12 445-49 118-29 188-109 325-82 101 20 169 75 280 39 57-19 104-48 150-47v454H0Z' fill='%23cde0e8' opacity='.82'/%3E%3Ccircle cx='958' cy='168' r='82' fill='%23f7c767'/%3E%3C/svg%3E");
      background-size: cover;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    main {
      width: min(1120px, 100%);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 20px;
      align-items: start;
    }

    section,
    aside {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #c9d6e2;
      border-radius: 8px;
      box-shadow: 0 22px 56px rgba(45, 61, 78, 0.16);
    }

    section {
      padding: 28px;
    }

    aside {
      padding: 22px;
      position: sticky;
      top: 24px;
    }

    h1,
    h2 {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      font-size: 30px;
      line-height: 1.15;
    }

    h2 {
      font-size: 18px;
    }

    p {
      margin: 8px 0 0;
      color: #536270;
    }

    form {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .field,
    fieldset {
      min-width: 0;
    }

    .wide {
      grid-column: 1 / -1;
    }

    label,
    legend {
      display: block;
      margin: 0 0 7px;
      color: #273847;
      font-size: 13px;
      font-weight: 720;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 42px;
      border: 1px solid #a9b8c7;
      border-radius: 6px;
      background: white;
      color: #17212c;
      font: inherit;
      font-size: 15px;
      padding: 9px 11px;
    }

    textarea {
      min-height: 76px;
      resize: vertical;
    }

    fieldset {
      border: 1px solid #cbd7e3;
      border-radius: 6px;
      padding: 13px 14px;
    }

    .choices {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .choice,
    .terms {
      display: flex;
      gap: 8px;
      align-items: center;
      color: #273847;
      font-size: 14px;
      font-weight: 600;
    }

    input[type="radio"],
    input[type="checkbox"] {
      width: 18px;
      min-height: 18px;
      padding: 0;
    }

    input[type="range"] {
      padding: 0;
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr 44px;
      gap: 12px;
      align-items: center;
    }

    #travel-output {
      min-height: 34px;
      border-radius: 6px;
      background: #e7f3ee;
      color: #146348;
      display: grid;
      place-items: center;
      font-weight: 760;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      background: #1f6f8b;
      color: white;
      font-size: 15px;
      font-weight: 760;
      padding: 0 18px;
    }

    button:hover {
      background: #185b72;
    }

    #summary {
      margin-top: 16px;
      display: grid;
      gap: 10px;
      color: #273847;
      font-size: 14px;
    }

    .summary-row {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 10px;
    }

    .summary-row strong {
      color: #17212c;
    }

    .empty {
      color: #6b7a88;
    }

    @media (max-width: 860px) {
      body {
        padding: 16px;
      }

      main {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
      }
    }

    @media (max-width: 620px) {
      form {
        grid-template-columns: 1fr;
      }

      section {
        padding: 20px;
      }
    }
  </style>
</head>

<body>
  <main>
    <section>
      <h1>Member Intake Form</h1>
      <p>Collect practical contact and preference details before scheduling a consultation.</p>
      <form id="intake-form">
        <div class="field">
          <label for="full-name">Full name</label>
          <input id="full-name" class="field-control contact-input" name="full_name" placeholder="Jordan Lee"
            autocomplete="name" />
        </div>
        <div class="field">
          <label for="email">Email address</label>
          <input id="email" class="field-control contact-input" name="email" type="email"
            placeholder="jordan@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="phone">Telephone</label>
          <input id="phone" class="field-control contact-input" name="phone" type="tel" placeholder="+1 415 555 0184"
            autocomplete="tel" />
        </div>
        <div class="field">
          <label for="street-address">Street address</label>
          <input id="street-address" class="field-control address-input" name="street_address"
            placeholder="742 Evergreen Terrace" autocomplete="street-address" />
        </div>
        <div class="field">
          <label for="city">City</label>
          <input id="city" class="field-control address-input" name="city" placeholder="Springfield"
            autocomplete="address-level2" />
        </div>
        <div class="field">
          <label for="postal-code">Postal code</label>
          <input id="postal-code" class="field-control address-input" name="postal_code" placeholder="94107"
            autocomplete="postal-code" />
        </div>
        <fieldset class="wide">
          <legend>Gender</legend>
          <div class="choices">
            <label class="choice"><input type="radio" name="gender" value="Female" /> Female</label>
            <label class="choice"><input type="radio" name="gender" value="Male" /> Male</label>
            <label class="choice"><input type="radio" name="gender" value="Non-binary" /> Non-binary</label>
            <label class="choice"><input type="radio" name="gender" value="Prefer not to say" /> Prefer not to
              say</label>
          </div>
        </fieldset>
        <div class="field">
          <label for="salary-tier">Salary tier</label>
          <select id="salary-tier" class="field-control" name="salary_tier">
            <option value="">Select a tier</option>
            <option value="under-50k">Under $50,000</option>
            <option value="50k-100k">$50,000 to $100,000</option>
            <option value="100k-150k">$100,000 to $150,000</option>
            <option value="150k-plus">$150,000 or more</option>
          </select>
        </div>
        <div class="field">
          <label for="travel-readiness">Travel readiness</label>
          <div class="range-row">
            <input id="travel-readiness" class="field-control" name="travel_readiness" type="range" min="0" max="10"
              value="3" />
            <output id="travel-output" for="travel-readiness">3</output>
          </div>
        </div>
        <div class="field wide">
          <label for="notes">Notes</label>
          <textarea id="notes" class="field-control" name="notes"
            placeholder="Share anything the advisor should know before the call."></textarea>
        </div>
        <label class="terms wide">
          <input id="terms" name="terms" type="checkbox" />
          I agree with the terms and conditions of the member consultation program.
        </label>
        <button class="wide" type="submit">Review intake details</button>
      </form>
    </section>
    <aside aria-live="polite">
      <h2>Review</h2>
      <p>Submitted details will appear here.</p>
      <div id="summary" class="empty">No intake details submitted yet.</div>
    </aside>
  </main>
  <script>
    const form = document.querySelector("#intake-form");
    const summary = document.querySelector("#summary");
    const travel = document.querySelector("#travel-readiness");
    const travelOutput = document.querySelector("#travel-output");

    travel.addEventListener("input", () => {
      travelOutput.textContent = travel.value;
    });

    form.addEventListener("submit", event => {
      event.preventDefault();
      const data = new FormData(form);
      const values = {
        name: data.get("full_name") || "Not provided",
        email: data.get("email") || "Not provided",
        phone: data.get("phone") || "Not provided",
        address: `${data.get("street_address") || ""}, ${data.get("city") || ""} ${data.get("postal_code") || ""}`.replace(/^,\s*/, "").trim() || "Not provided",
        gender: data.get("gender") || "Not provided",
        salary: document.querySelector("#salary-tier option:checked").textContent,
        travel: `${data.get("travel_readiness")} out of 10`,
        terms: data.get("terms") ? "Accepted" : "Not accepted",
      };

      summary.classList.remove("empty");
      summary.innerHTML = Object.entries(values)
        .map(([label, value]) => `<div class="summary-row"><strong>${label}</strong><span>${value}</span></div>`)
        .join("");
    });
  </script>
</body>

</html>
